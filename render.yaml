services:
  - type: web
    name: grappling-wiki
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/auto_seed.py && gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_CONFIG
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        sync: false   # Set this manually in the Render dashboard — paste your Neon connection string here
